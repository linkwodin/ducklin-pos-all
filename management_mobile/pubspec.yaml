name: management_mobile
description: POS Management mobile app (iOS & Android) with biometric login.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  intl: any
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  sensors_plus: ^6.1.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - assets/sounds/scan_success.wav
    - assets/sounds/scan_error.wav
